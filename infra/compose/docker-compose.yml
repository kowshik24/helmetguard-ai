services:
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

  api:
    build:
      context: ../..
      dockerfile: api/Dockerfile
    env_file:
      - ../../.env
    volumes:
      - ../../data:/app/data
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - redis

  worker:
    build:
      context: ../..
      dockerfile: worker/Dockerfile
    env_file:
      - ../../.env
    volumes:
      - ../../data:/app/data
    depends_on:
      - redis
