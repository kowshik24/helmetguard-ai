<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HelmetGuard AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #eef3f1;
        --bg-accent: #d9e8e2;
        --text: #102015;
        --muted: #516357;
        --card: #f9fcfb;
        --border: #d4e2dc;
        --primary: #0f766e;
        --primary-dark: #0a5e57;
        --chip: #e6f4f2;
        --code: #0b1320;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 8% 5%, #ffffff 0%, transparent 35%),
          radial-gradient(circle at 90% 10%, var(--bg-accent) 0%, transparent 30%),
          var(--bg);
      }
      .shell {
        max-width: 1020px;
        margin: 28px auto;
        padding: 0 16px 24px;
      }
      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 20px;
        box-shadow: 0 10px 32px rgba(17, 31, 24, 0.09);
      }
      h1 {
        margin: 0;
        font-size: clamp(1.7rem, 2.6vw, 2.3rem);
        letter-spacing: -0.03em;
      }
      .subtitle {
        margin: 8px 0 18px;
        color: var(--muted);
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: end;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .field label {
        font-size: 0.87rem;
        color: var(--muted);
      }
      input[type="file"],
      select,
      input[type="number"] {
        width: 100%;
        min-height: 42px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: white;
        color: var(--text);
        padding: 8px 10px;
        font-family: inherit;
      }
      .btn {
        border: 0;
        min-height: 42px;
        padding: 0 14px;
        border-radius: 10px;
        font-family: inherit;
        font-weight: 600;
        cursor: pointer;
        color: #f4fffd;
        background: linear-gradient(160deg, var(--primary), var(--primary-dark));
      }
      .btn.secondary {
        color: var(--text);
        background: #edf4f1;
        border: 1px solid var(--border);
      }
      .status {
        margin-top: 14px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--chip);
        color: #215848;
        font-size: 0.92rem;
      }
      .filters {
        margin-top: 16px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        align-items: end;
      }
      .links {
        margin-top: 12px;
        color: var(--muted);
      }
      .links a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
      }
      .result-box {
        margin-top: 14px;
        background: var(--code);
        color: #d7e3f5;
        border-radius: 12px;
        padding: 12px;
        min-height: 120px;
        max-height: 340px;
        overflow: auto;
        border: 1px solid #1c2b3f;
      }
      pre {
        margin: 0;
        font-size: 0.82rem;
      }
      @media (max-width: 860px) {
        .grid { grid-template-columns: 1fr; }
        .filters { grid-template-columns: 1fr 1fr; }
      }
      @media (max-width: 520px) {
        .filters { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="panel">
        <h1>HelmetGuard AI</h1>
        <p class="subtitle">Upload a traffic clip, track violations, and open a full evidence dashboard.</p>

        <div class="grid">
          <div class="field">
            <label for="videoFile">Video File</label>
            <input id="videoFile" type="file" accept="video/*" />
          </div>
          <button id="uploadBtn" class="btn">Upload & Analyze</button>
        </div>

        <div id="status" class="status">Idle</div>

        <div class="filters">
          <div class="field">
            <label for="ocrFilter">OCR Filter</label>
            <select id="ocrFilter">
              <option value="">All</option>
              <option value="success">Success</option>
              <option value="not_visible">Not visible</option>
              <option value="failed">Failed</option>
            </select>
          </div>
          <div class="field">
            <label for="plateFilter">Plate Filter</label>
            <select id="plateFilter">
              <option value="">All</option>
              <option value="true">Plate present</option>
              <option value="false">Plate missing</option>
            </select>
          </div>
          <div class="field">
            <label for="helmetFilter">Min no-helmet riders</label>
            <input id="helmetFilter" type="number" min="0" value="0" />
          </div>
          <button id="applyFilterBtn" class="btn secondary">Apply Filters</button>
        </div>

        <div id="downloads" class="links"></div>
        <div id="resultsPageLink" class="links"></div>
        <div class="result-box"><pre id="results"></pre></div>
      </div>
    </div>

    <script>
      const statusEl = document.getElementById('status');
      const resultsEl = document.getElementById('results');
      const uploadBtn = document.getElementById('uploadBtn');
      const applyFilterBtn = document.getElementById('applyFilterBtn');
      const downloadsEl = document.getElementById('downloads');
      const resultsPageLinkEl = document.getElementById('resultsPageLink');
      let latestJobId = null;

      function buildFilterQuery() {
        const params = new URLSearchParams();
        const ocr = document.getElementById('ocrFilter').value;
        const plate = document.getElementById('plateFilter').value;
        const minNoHelmet = document.getElementById('helmetFilter').value || '0';
        if (ocr) params.set('ocr_status', ocr);
        if (plate) params.set('has_plate', plate);
        params.set('min_no_helmet', minNoHelmet);
        return params.toString();
      }

      async function fetchResults(jobId) {
        const query = buildFilterQuery();
        const url = query ? `/api/v1/jobs/${jobId}/results?${query}` : `/api/v1/jobs/${jobId}/results`;
        const rr = await fetch(url);
        const result = await rr.json();
        resultsEl.textContent = JSON.stringify(result, null, 2);
        if (!result || !result.job_id) return;
        downloadsEl.innerHTML = [
          `<a href="/api/v1/jobs/${result.job_id}/artifacts/report?download=1" target="_blank">Report JSON</a>`,
          `<a href="/api/v1/jobs/${result.job_id}/artifacts/video?download=1" target="_blank">Download video</a>`
        ].join(' | ');
        resultsPageLinkEl.innerHTML = `<a href="/jobs/${result.job_id}" target="_blank">Open evidence dashboard</a>`;
      }

      async function pollJob(jobId) {
        let done = false;
        while (!done) {
          const res = await fetch(`/api/v1/jobs/${jobId}`);
          const data = await res.json();
          statusEl.textContent = `${data.status.toUpperCase()} · ${data.progress_pct}%`;

          if (data.status === 'completed' || data.status === 'failed') {
            done = true;
            await fetchResults(jobId);
          }
          await new Promise((resolve) => setTimeout(resolve, 1200));
        }
      }

      uploadBtn.addEventListener('click', async () => {
        const fileInput = document.getElementById('videoFile');
        if (!fileInput.files || !fileInput.files[0]) {
          statusEl.textContent = 'Please choose a video file.';
          return;
        }
        const form = new FormData();
        form.append('file', fileInput.files[0]);
        statusEl.textContent = 'Uploading...';
        resultsEl.textContent = '';

        const response = await fetch('/api/v1/jobs', { method: 'POST', body: form });
        const payload = await response.json();
        if (!response.ok) {
          statusEl.textContent = `Error: ${payload.detail || 'Upload failed'}`;
          return;
        }

        statusEl.textContent = `QUEUED · ${payload.job_id}`;
        latestJobId = payload.job_id;
        await pollJob(payload.job_id);
      });

      applyFilterBtn.addEventListener('click', async () => {
        if (!latestJobId) {
          statusEl.textContent = 'Run a job first to apply filters.';
          return;
        }
        await fetchResults(latestJobId);
      });
    </script>
  </body>
</html>
