<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HelmetGuard AI - Results</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #edf2ef;
        --bg-accent: #d5e5dd;
        --text: #122319;
        --muted: #4f6356;
        --card: #f9fcfa;
        --border: #d2e1db;
        --primary: #0f766e;
        --primary-dark: #0c6059;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 85% 6%, var(--bg-accent) 0%, transparent 36%),
          radial-gradient(circle at 3% 2%, #ffffff 0%, transparent 20%),
          var(--bg);
      }
      .shell { max-width: 1160px; margin: 24px auto; padding: 0 16px 24px; }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: 0 10px 30px rgba(14, 32, 20, 0.08);
      }
      .hero { padding: 20px; margin-bottom: 16px; }
      h2 { margin: 0; font-size: clamp(1.45rem, 2.2vw, 2rem); letter-spacing: -0.02em; }
      .subtitle { margin: 8px 0 0; color: var(--muted); }
      .controls {
        margin-top: 14px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        align-items: end;
      }
      .field { display: flex; flex-direction: column; gap: 6px; }
      .field label { font-size: .84rem; color: var(--muted); }
      select, input {
        min-height: 42px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: white;
        padding: 8px 10px;
        font-family: inherit;
      }
      button {
        min-height: 42px;
        border: 0;
        border-radius: 10px;
        background: linear-gradient(160deg, var(--primary), var(--primary-dark));
        color: #effffb;
        font-family: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      .meta-row {
        margin-top: 10px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        color: var(--muted);
        font-weight: 500;
      }
      .links a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
      }
      .video-wrap {
        margin-top: 12px;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--border);
        background: #090f14;
      }
      video { width: 100%; display: block; max-height: 440px; }
      .section-title {
        margin: 16px 0 10px;
        font-size: 1.08rem;
        color: #1b3327;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
        gap: 12px;
      }
      .violation { padding: 12px; }
      .thumb-wrap {
        height: 165px;
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 10px;
        background: linear-gradient(145deg, #dce8e3, #eff6f3);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
      .thumb-fallback { color: #5c7264; font-size: .88rem; font-weight: 600; }
      .track { font-weight: 700; font-size: 1.02rem; }
      .info { color: var(--muted); font-size: .92rem; }
      .download { margin-top: 8px; }
      .download a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
      }
      @media (max-width: 860px) {
        .controls { grid-template-columns: 1fr 1fr; }
      }
      @media (max-width: 560px) {
        .controls { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="hero card">
        <h2 id="title">Job Results</h2>
        <p class="subtitle">Review timeline evidence, playback output video, and download case files.</p>

        <div class="controls">
          <div class="field">
            <label for="ocrFilter">OCR Filter</label>
            <select id="ocrFilter">
              <option value="">All</option>
              <option value="success">Success</option>
              <option value="not_visible">Not visible</option>
              <option value="failed">Failed</option>
            </select>
          </div>
          <div class="field">
            <label for="plateFilter">Plate Filter</label>
            <select id="plateFilter">
              <option value="">All</option>
              <option value="true">Plate present</option>
              <option value="false">Plate missing</option>
            </select>
          </div>
          <div class="field">
            <label for="helmetFilter">Min no-helmet riders</label>
            <input id="helmetFilter" type="number" min="0" value="0" />
          </div>
          <button id="applyBtn">Apply Filters</button>
        </div>

        <div id="summary" class="meta-row"></div>
        <div id="downloads" class="meta-row links"></div>

        <div class="video-wrap">
          <video id="videoPlayer" controls preload="metadata"></video>
        </div>
      </div>

      <h3 class="section-title">Violation Cards</h3>
      <div id="violations" class="grid"></div>
    </div>

    <script>
      const jobId = window.location.pathname.split('/').pop();
      const titleEl = document.getElementById('title');
      const summaryEl = document.getElementById('summary');
      const downloadsEl = document.getElementById('downloads');
      const violationsEl = document.getElementById('violations');
      const videoPlayer = document.getElementById('videoPlayer');

      function query() {
        const p = new URLSearchParams();
        const ocr = document.getElementById('ocrFilter').value;
        const plate = document.getElementById('plateFilter').value;
        const minNoHelmet = document.getElementById('helmetFilter').value || '0';
        if (ocr) p.set('ocr_status', ocr);
        if (plate) p.set('has_plate', plate);
        p.set('min_no_helmet', minNoHelmet);
        return p.toString();
      }

      function cardHtml(v) {
        const img = `/api/v1/jobs/${jobId}/violations/${v.id}/evidence`;
        const plate = v.plate_text || 'N/A';
        const conf = v.plate_confidence == null ? 'N/A' : Number(v.plate_confidence).toFixed(3);
        return `
          <article class="violation card">
            <div class="thumb-wrap">
              <img class="thumb" src="${img}" alt="evidence"
                onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=thumb-fallback>Evidence preview unavailable</div>'" />
            </div>
            <div class="track">${v.track_id} @ ${v.timestamp_sec}s</div>
            <div class="info">Riders: ${v.rider_count} | No helmet: ${v.no_helmet_count}</div>
            <div class="info">OCR: ${v.ocr_status}</div>
            <div class="info">Plate: ${plate} (conf: ${conf})</div>
            <div class="download"><a href="${img}?download=1" target="_blank">Download evidence</a></div>
          </article>
        `;
      }

      async function loadResults() {
        const qs = query();
        const url = qs ? `/api/v1/jobs/${jobId}/results?${qs}` : `/api/v1/jobs/${jobId}/results`;
        const res = await fetch(url);
        const data = await res.json();

        titleEl.textContent = `Job ${data.job_id} (${data.status})`;
        summaryEl.innerHTML = `<span>Violations: <strong>${data.total_violations}</strong></span>`;
        downloadsEl.innerHTML = `
          <a href="/api/v1/jobs/${jobId}/artifacts/report?download=1" target="_blank">Report JSON</a>
          <a href="/api/v1/jobs/${jobId}/artifacts/video?download=1" target="_blank">Download Annotated Video</a>
        `;

        videoPlayer.src = `/api/v1/jobs/${jobId}/artifacts/video`;

        if (!data.violations || !data.violations.length) {
          violationsEl.innerHTML = `<div class="card" style="padding:14px; color:#4f6356;">No violations found for selected filters.</div>`;
          return;
        }

        violationsEl.innerHTML = data.violations.map(cardHtml).join('');
      }

      document.getElementById('applyBtn').addEventListener('click', loadResults);
      loadResults();
    </script>
  </body>
</html>
